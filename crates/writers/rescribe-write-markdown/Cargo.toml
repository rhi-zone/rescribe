[package]
name = "rescribe-write-markdown"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Markdown writer for rescribe"

[dependencies]
rescribe-core.workspace = true
rescribe-std.workspace = true

[features]
# Enable pulldown-cmark backend tests in addition to tree-sitter backend tests
pulldown = ["rescribe-read-markdown/pulldown"]

[dev-dependencies]
rescribe-read-markdown = { workspace = true, features = ["tree-sitter"] }

write-zimwiki = ["dep:rescribe-write-zimwiki"]
format-zimwiki = ["read-zimwiki", "write-zimwiki"]

# Format groups — non-disjoint; a format may appear in multiple groups.
# `all` is defined as the union of all groups, so coverage is self-verifying.

# Lightweight human-written markup languages.
formats-markup = [
    "format-asciidoc", "format-commonmark", "format-djot", "format-fountain",
    "format-gfm", "format-man", "format-markdown", "format-markdown-strict",
    "format-markua", "format-multimarkdown", "format-muse", "format-org",
    "format-pod", "format-rst", "format-t2t", "format-textile",
]

# Wiki and community markup dialects.
formats-wiki = [
    "format-bbcode", "format-creole", "format-dokuwiki", "format-haddock",
    "format-jira", "format-mediawiki", "format-muse", "format-tikiwiki",
    "format-twiki", "format-vimwiki", "format-xwiki", "format-zimwiki",
]

# Rich/structured document formats (office, XML, binary).
formats-document = [
    "format-docbook", "format-docx", "format-epub", "format-fb2",
    "format-html", "format-ipynb", "format-jats", "format-odt",
    "format-opml", "format-pdf", "format-rtf", "format-tei",
]

# Tabular / spreadsheet formats.
formats-spreadsheet = [
    "format-csv", "format-tsv", "format-xlsx",
]

# Presentation / slideshow formats.
formats-presentation = [
    "format-beamer", "format-dzslides", "format-pptx", "format-revealjs",
    "format-s5", "format-slidy", "format-slideous",
]

# Typesetting and publishing formats.
formats-typesetting = [
    "format-beamer", "format-context", "format-icml", "format-latex",
    "format-ms", "format-texinfo", "format-typst",
]

# Bibliographic reference formats.
formats-bibliography = [
    "format-biblatex", "format-bibtex", "format-csl-json",
    "format-endnotexml", "format-ris",
]

# Formats that don't fit neatly into the above groups.
formats-other = [
    "format-ansi", "format-chunkedhtml", "format-native",
    "format-pandoc-json", "format-plaintext",
]

# All formats — union of all group features.
all = [
    "std", "math",
    "formats-markup", "formats-wiki", "formats-document",
    "formats-spreadsheet", "formats-presentation", "formats-typesetting",
    "formats-bibliography", "formats-other",
]


[package]
name = "rescribe"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Universal document conversion library with fidelity tracking"
keywords = ["document", "conversion", "pandoc", "markdown", "html"]
categories = ["text-processing", "parser-implementations"]

[features]
default = ["std", "format-markdown", "format-html"]

# Node definition crates (not language features — no format- prefix)
std = ["dep:rescribe-std"]
math = ["dep:rescribe-math"]

# Granular read/write features, one per format.
# Use format-{fmt} to enable both directions at once.
read-ansi = ["dep:rescribe-read-ansi"]
write-ansi = ["dep:rescribe-write-ansi"]
format-ansi = ["read-ansi", "write-ansi"]

read-asciidoc = ["dep:rescribe-read-asciidoc"]
write-asciidoc = ["dep:rescribe-write-asciidoc"]
format-asciidoc = ["read-asciidoc", "write-asciidoc"]

read-bbcode = ["dep:rescribe-read-bbcode"]

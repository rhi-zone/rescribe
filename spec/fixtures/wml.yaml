version: 1
fixtures:
  # ---------------------------------------------------------------------------
  # wml/text/ — run-level formatting (boolean)
  # ---------------------------------------------------------------------------
  - id: fixture_wml_text_bold
    format: wml
    path: wml/text/bold.docx
    description: "Bold run"
    template: wml_run_bool
    params:
      setter: set_bold
      assertion_type: RunBold
      text: "bold"
      expected: true

  - id: fixture_wml_text_italic
    format: wml
    path: wml/text/italic.docx
    description: "Italic run"
    template: wml_run_bool

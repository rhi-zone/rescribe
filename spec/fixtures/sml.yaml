version: 1
fixtures:
  # ---------------------------------------------------------------------------
  # sml/cell — cell value types
  # ---------------------------------------------------------------------------
  - id: fixture_sml_cell_integer
    format: sml
    path: sml/cell/integer.xlsx
    description: "Integer cell value"
    template: sml_cell_value
    params:
      value: "42"
      cell_type: "number"
      tolerance: 0.0

  - id: fixture_sml_cell_float
    format: sml
    path: sml/cell/float.xlsx
    description: "Float cell value"
    template: sml_cell_value
    params:
      value: "3.14"
      cell_type: "number"
      tolerance: 1.0e-9

  - id: fixture_sml_cell_negative
    format: sml
    path: sml/cell/negative.xlsx
    description: "Negative float cell value"
    template: sml_cell_value
    params:
      value: "-273.15"
      cell_type: "number"
      tolerance: 1.0e-9

  - id: fixture_sml_cell_zero
